<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aushilfe Schichten – OKYU</title>
  <meta name="description" content="Melde dich für offene Aushilfe-Schichten bei OKYU an. Wähle deinen Wunschtag und trage dich direkt ein.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap">
  <!-- Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ── CSS Variables ── */
    :root {
      --bg:          #0d0f14;
      --bg-card:     #161922;
      --bg-input:    #1e2230;
      --border:      rgba(255,255,255,.08);
      --text-primary:#f0f2f7;
      --text-sec:    #9da5b8;
      --text-muted:  #636b7e;
      --accent:      #667eed;
      --accent-glow: rgba(102,126,237,.3);
      --success:     #34c77b;
      --success-bg:  rgba(52,199,123,.1);
      --warning:     #f59e0b;
      --warning-bg:  rgba(245,158,11,.1);
      --danger:      #ef4444;
      --danger-bg:   rgba(239,68,68,.1);
      --radius:      14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Page Layout ── */
    .page-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    /* ── Header ── */
    .pub-header {
      text-align: center;
      padding: 40px 20px 32px;
      position: relative;
    }

    .pub-logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), #9b59b6);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px var(--accent-glow);
    }

    .pub-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .pub-subtitle {
      font-size: 1rem;
      color: var(--text-sec);
      max-width: 440px;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* ── Filter Bar ── */
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-select {
      flex: 1;
      min-width: 140px;
      padding: 10px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      cursor: pointer;
      outline: none;
      transition: border-color .2s;
    }

    .filter-select:focus { border-color: var(--accent); }

    /* ── Month group header ── */
    .month-group-header {
      font-size: .75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 4px 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }

    /* ── Slot Cards ── */
    .slots-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .slot-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .2s, transform .15s;
    }

    .slot-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .slot-card-body {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      flex-wrap: wrap;
    }

    .slot-date-col {
      min-width: 60px;
      text-align: center;
      flex-shrink: 0;
    }

    .slot-dow {
      font-size: .72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .slot-day {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .slot-mon {
      font-size: .75rem;
      color: var(--text-sec);
    }

    .slot-info {
      flex: 1;
      min-width: 0;
    }

    .slot-label {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .slot-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .slot-meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: .82rem;
      color: var(--text-sec);
    }

    .slot-meta-item .ms {
      font-size: 1rem;
      color: var(--text-muted);
    }

    .slot-note {
      margin-top: 6px;
      font-size: .8rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .slot-action {
      flex-shrink: 0;
    }

    /* ── Register Form (inline expand) ── */
    .slot-form-wrap {
      border-top: 1px solid var(--border);
      background: var(--bg-input);
      padding: 16px 18px;
      display: none;
    }

    .slot-form-wrap.open { display: block; }

    .slot-form-title {
      font-size: .9rem;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text-primary);
    }

    .slot-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 480px) {
      .slot-form-grid { grid-template-columns: 1fr; }
    }

    .form-group label {
      display: block;
      font-size: .78rem;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      outline: none;
      transition: border-color .2s;
    }

    .form-input:focus { border-color: var(--accent); }

    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      justify-content: flex-end;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }

    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 14px var(--accent-glow);
    }

    .btn-secondary {
      background: var(--bg-input);
      color: var(--text-sec);
      border: 1px solid var(--border);
    }

    .btn .ms { font-size: 1rem; }

    /* ── States ── */
    .loading-state, .empty-state, .success-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .state-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .state-sub {
      font-size: .88rem;
      line-height: 1.5;
    }

    .success-state {
      background: var(--success-bg);
      border: 1px solid var(--success);
      border-radius: var(--radius);
      color: var(--success);
      padding: 24px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    #pub-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: .88rem;
      font-weight: 600;
      color: var(--text-primary);
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      z-index: 9999;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
    }

    #pub-toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Material Icons ── */
    .ms {
      font-family: 'Material Symbols Rounded';
      font-weight: normal;
      font-style: normal;
      font-size: inherit;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-feature-settings: 'liga';
      font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
      vertical-align: middle;
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 20;
    }
  </style>
</head>
<body>

<div class="page-wrap">

  <!-- Header -->
  <div class="pub-header">
    <div class="pub-logo">🍣</div>
    <h1 class="pub-title">Offene Schichten</h1>
    <p class="pub-subtitle">Melde dich für eine offene Aushilfe-Schicht an. Gebuchte Schichten werden automatisch ausgeblendet.</p>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <select class="filter-select" id="filterLoc" onchange="applyFilters()">
      <option value="all">Alle Standorte</option>
    </select>
    <select class="filter-select" id="filterMonth" onchange="applyFilters()">
      <!-- Filled by JS -->
    </select>
  </div>

  <!-- Weekly limit banner (filled by JS) -->
  <div id="limitBanner" style="
    display:none;
    align-items:center;
    gap:10px;
    padding:12px 16px;
    background:rgba(102,126,237,.1);
    border:1px solid rgba(102,126,237,.25);
    border-radius:12px;
    margin-bottom:20px;
    font-size:.88rem;
    color:#a29bfe;
    font-weight:500;
  "></div>

  <!-- Slots container -->
  <div id="slotsContainer">
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="state-title">Schichten werden geladen…</div>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="pub-toast"></div>

<script src="js/aushilfe-public.js"></script>
</body>
</html>
