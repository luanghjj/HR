<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
  <title>GehaltsManager — SieuVuong</title>
  <meta name="description" content="Gehaltsverwaltung für Blossom, Enso, Okyu, Origami">
  <meta name="theme-color" content="#0f1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GehaltsManager">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Favicon (inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍣</text></svg>" type="image/svg+xml">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Nunito:ital,wght@0,900;1,900&display=swap" rel="stylesheet">

  <!-- App Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Unregister old Next.js Service Workers -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister();
          console.log('[SW] Unregistered old service worker:', registration.scope);
        }
      });
    }
  </script>

  <div id="app">
    <!-- Loading Shell -->
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;width:100%;background:#f0f2f5;flex-direction:column;gap:16px">
      <div style="width:40px;height:40px;border:3px solid #e2e4e9;border-top-color:#3b7ddd;border-radius:50%;animation:spin 0.8s linear infinite"></div>
      <div style="font-family:'DM Sans',system-ui,sans-serif;font-size:14px;font-weight:700;color:#1a1d26">GehaltsManager</div>
      <div style="font-family:'DM Sans',system-ui,sans-serif;font-size:11px;color:#6b7280">Daten werden aus Supabase geladen...</div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
  </div>

  <!-- Supabase CDN (loaded BEFORE app module) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- App Entry Point -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
