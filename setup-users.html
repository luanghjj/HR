<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>OKYU – Setup Users</title>
<style>
  body { font-family: system-ui; background: #1a1a2e; color: #eee; padding: 40px; }
  .card { background: #16213e; border-radius: 12px; padding: 24px; max-width: 600px; margin: 0 auto; }
  h1 { text-align: center; }
  .log { background: #0f0f23; border-radius: 8px; padding: 16px; margin-top: 16px; font-family: monospace; font-size: 13px; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
  .ok { color: #00b894; }
  .err { color: #e17055; }
  .warn { color: #fdcb6e; }
  button { background: #6c5ce7; color: #fff; border: none; padding: 12px 32px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 16px; }
  button:hover { background: #7c6cf7; }
  button:disabled { opacity: .5; }
</style>
</head>
<body>
<div class="card">
  <h1>🔧 OKYU – Auth Setup</h1>
  <p>Tạo 4 tài khoản qua Supabase Auth API (đúng cách, không lỗi schema)</p>
  <button id="btn" onclick="setupAll()">🚀 Tạo 4 Users</button>
  <div class="log" id="log">Sẵn sàng...\n</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://zkxsyipyjqikqxswpbks.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpreHN5aXB5anFpa3F4c3dwYmtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzgxOTMsImV4cCI6MjA5MTIxNDE5M30.oodwUnavIkmHS6W08OwpAoxxFoBPcJ6ZOizOQkaE5PY';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const logEl = document.getElementById('log');

function log(msg, cls='') {
  logEl.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

const USERS = [
  { email: 'inhaber@okyu.de', name: 'Linh Nguyen',  role: 'inhaber',     location: 'okyu_central', avatar: 'LN', empId: 1 },
  { email: 'manager@okyu.de', name: 'Yuki Tanaka',  role: 'manager',     location: 'origami',      avatar: 'YT', empId: 2 },
  { email: 'anna@okyu.de',    name: 'Anna Schmidt', role: 'mitarbeiter', location: 'origami',      avatar: 'AS', empId: 3 },
  { email: 'azubi@okyu.de',   name: 'Max Weber',    role: 'azubi',       location: 'origami',      avatar: 'MW', empId: 4 }
];

const PASSWORD = 'Okyu2026!';

async function setupAll() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Läuft...';
  logEl.innerHTML = '';

  for (const u of USERS) {
    log(`\n📧 ${u.email} (${u.role})...`);

    // 1. Sign up
    const { data, error } = await sb.auth.signUp({
      email: u.email,
      password: PASSWORD,
      options: { data: { name: u.name } }
    });

    if (error) {
      if (error.message.includes('already registered')) {
        log(`  ⚠️ Bereits vorhanden – übersprungen`, 'warn');
      } else {
        log(`  ❌ ${error.message}`, 'err');
      }
      continue;
    }

    if (!data.user) {
      log(`  ❌ Kein User zurückgegeben`, 'err');
      continue;
    }

    log(`  ✓ Auth User erstellt: ${data.user.id}`, 'ok');

    // 2. Create user_profile
    const userId = 'emp_' + u.name.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
    const { error: profErr } = await sb.from('user_profiles').insert({
      auth_user_id: data.user.id,
      user_id: userId,
      name: u.name,
      role: u.role,
      location: u.location,
      avatar: u.avatar,
      emp_id: u.empId
    });

    if (profErr) {
      log(`  ⚠️ Profile: ${profErr.message}`, 'warn');
    } else {
      log(`  ✓ Profile erstellt: ${u.role} → emp_id=${u.empId}`, 'ok');
    }

    // Sign out between users
    await sb.auth.signOut();
  }

  log(`\n════════════════════════════════════`);
  log(`✅ Fertig! Login-Daten:`, 'ok');
  log(`   Passwort für alle: ${PASSWORD}`);
  USERS.forEach(u => log(`   ${u.email} → ${u.role}`, 'ok'));

  btn.textContent = '✅ Fertig!';
}
</script>
</body>
</html>
